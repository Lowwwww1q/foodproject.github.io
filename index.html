<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Где поесть?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
    
    <style>
        /* ИСПОЛЬЗУЕМ СИСТЕМНЫЕ ПЕРЕМЕННЫЕ TELEGRAM ДЛЯ ЦВЕТОВ */
        body, html { 
            padding: 0; margin: 0; width: 100%; height: 100%; 
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5); 
            color: var(--tg-theme-text-color, #000000); 
            font-family: sans-serif; 
        }
        
        /* Шапка с переключателем */
        #header {
            display: flex; justify-content: center; gap: 10px;
            padding: 10px; 
            background-color: var(--tg-theme-bg-color, #ffffff);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative; z-index: 10;
        }
        
        .toggle-btn {
            padding: 8px 20px; border: none; border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #e0e0e0); 
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        
        .toggle-btn.active { 
            background-color: #ff9800; 
            color: white; 
        }

        #btn-geo {
            padding: 8px 12px;
            background-color: var(--tg-theme-secondary-bg-color, #e0e0e0); 
        }

        /* Контейнеры для экранов */
        #map { width: 100%; height: calc(100vh - 55px); display: none; }
        #list-view { 
            width: 100%; height: calc(100vh - 55px); 
            display: none; overflow-y: auto; padding-top: 10px;
        }
        
        #loading { text-align: center; padding-top: 50px; }

        /* Дизайн карточек в списке */
        .place-card {
            background-color: var(--tg-theme-bg-color, #ffffff);
            margin: 0 15px 15px 15px; padding: 15px;
            border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .place-card h3 { 
            margin: 0 0 5px 0; 
            color: var(--tg-theme-text-color, #333333); 
        }
        
        .place-card p { 
            margin: 5px 0; 
            color: var(--tg-theme-hint-color, #666666); 
            font-size: 14px; 
        }
        
        .place-tags {
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;
            font-size: 13px; font-weight: bold;
        }
        .tag-price { color: #4caf50; }
        .tag-rating { color: #ff9800; }
        .tag-distance { color: #2196F3; } 

        /* === КНОПКИ ДЕЙСТВИЙ (МАРШРУТ И ОЦЕНКА) === */
        .action-buttons {
            display: flex; gap: 10px; margin-top: 15px; width: 100%;
        }
        .rate-btn {
            background-color: #ff9800; color: white; border: none;
            padding: 8px 10px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 50%; font-size: 14px;
        }
        .route-btn {
            background-color: #2196F3; color: white; border: none;
            padding: 8px 10px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 50%; font-size: 14px;
        }
        
        /* МАГИЯ ТЁМНОЙ ТЕМЫ ДЛЯ КАРТЫ ЯНДЕКСА */
        body.dark-mode [class$="-ground-pane"] {
            filter: invert(100%) hue-rotate(180deg) brightness(90%) contrast(90%);
        }
        body.dark-mode [class$="-controls-pane"] {
            opacity: 0.8;
        }

        /* АДАПТАЦИЯ БАЛУНА ПОД ТЕМНУЮ ТЕМУ */
        [class$="-balloon__layout"], [class$="-balloon__content"] {
            background-color: var(--tg-theme-bg-color, #ffffff) !important;
            color: var(--tg-theme-text-color, #000000) !important;
            border-radius: 8px !important; 
        }
        [class$="-balloon__tail"]::after {
            background-color: var(--tg-theme-bg-color, #ffffff) !important;
        }
        body.dark-mode [class$="-balloon__layout"],
        body.dark-mode [class$="-balloon__content"] {
            background-color: var(--tg-theme-bg-color, #1e1e1e) !important;
            color: var(--tg-theme-text-color, #ffffff) !important;
        }
        body.dark-mode [class$="-balloon__tail"]::after {
            background-color: var(--tg-theme-bg-color, #1e1e1e) !important;
        }
        body.dark-mode [class$="-balloon__close-button"] {
            filter: invert(100%) !important;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    
    <div id="header">
        <button id="btn-map" class="toggle-btn active" onclick="switchView('map')">🗺️ Карта</button>
        <button id="btn-list" class="toggle-btn" onclick="switchView('list')">📋 Список</button>
        <button id="btn-geo" class="toggle-btn" onclick="findMeAndSort()" title="Ближайшие ко мне">📍</button>
    </div>

    <div id="loading">
        <h2>⏳ Загрузка данных...</h2>
    </div>
    
    <div id="map"></div>
    <div id="list-view"></div>

    <script>
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
            let tg = window.Telegram.WebApp;
            tg.expand();
            tg.setHeaderColor('bg_color');

            function applyTheme() {
                if (tg.colorScheme === 'dark') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
            applyTheme();
            tg.onEvent('themeChanged', applyTheme);
        }

        let allPlaces = [];
        let myMap; 
        let userPlacemark = null; 

        ymaps.ready(init);

        function init() {
            myMap = new ymaps.Map("map", {
                center: [53.243562, 34.363407], 
                zoom: 14,
                controls: ['zoomControl'] 
            });

            fetch('/api/places', { headers: { 'ngrok-skip-browser-warning': 'true' } })
            .then(res => res.json())
            .then(places => {
                allPlaces = places;

                places.forEach(place => {
                    let placemark = new ymaps.Placemark([place.lat, place.lon], {
                        balloonContentHeader: `<b>${place.name}</b>`,
                        // ДОБАВИЛИ ДВЕ КНОПКИ В БАЛУН
                        balloonContentBody: `${place.description}<br><br><b>Цена:</b> ~${place.price}₽<br><b>Рейтинг:</b> ${place.rating.toFixed(1)}⭐
                        <div class="action-buttons">
                            <button class="route-btn" onclick="buildRoute(${place.lat}, ${place.lon})">🧭 Маршрут</button>
                            <button class="rate-btn" onclick="ratePlace(${place.id})">Оценить</button>
                        </div>`
                    }, { preset: 'islands#orangeFoodIcon' });
                    
                    place.placemark = placemark; 
                    myMap.geoObjects.add(placemark);
                });

                renderList();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('map').style.display = 'block';
            })
            .catch(err => {
                console.error("Ошибка загрузки данных:", err);
                document.getElementById('loading').innerHTML = "<h2>❌ Не удалось связаться с сервером</h2>";
            });
        }

        function switchView(view) {
            if (view === 'map') {
                document.getElementById('map').style.display = 'block';
                document.getElementById('list-view').style.display = 'none';
                document.getElementById('btn-map').classList.add('active');
                document.getElementById('btn-list').classList.remove('active');
            } else {
                document.getElementById('map').style.display = 'none';
                document.getElementById('list-view').style.display = 'block';
                document.getElementById('btn-list').classList.add('active');
                document.getElementById('btn-map').classList.remove('active');
            }
        }

        function renderList() {
            const listContainer = document.getElementById('list-view');
            listContainer.innerHTML = ''; 

            allPlaces.forEach(place => {
                const card = document.createElement('div');
                card.className = 'place-card';
                
                let distanceHtml = '';
                if (place.distance !== undefined) {
                    let distText = place.distance < 1 ? Math.round(place.distance * 1000) + ' м' : place.distance.toFixed(1) + ' км';
                    distanceHtml = `<span class="tag-distance">📍 ${distText}</span>`;
                }

                // ДОБАВИЛИ ДВЕ КНОПКИ В КАРТОЧКУ
                card.innerHTML = `
                    <h3>${place.name}</h3>
                    <p>${place.description}</p>
                    <div class="place-tags">
                        ${distanceHtml}
                        <span class="tag-price">💰 ~${place.price} ₽</span>
                        <span class="tag-rating">⭐ ${place.rating.toFixed(1)} / 5</span>
                    </div>
                    <div class="action-buttons">
                        <button class="route-btn" onclick="buildRoute(${place.lat}, ${place.lon})">🧭 Маршрут</button>
                        <button class="rate-btn" onclick="ratePlace(${place.id})">Оценить</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }
        
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function findMeAndSort() {
            if (!navigator.geolocation) {
                alert("Ваш телефон не поддерживает геолокацию.");
                return;
            }

            navigator.geolocation.getCurrentPosition(position => {
                let userLat = position.coords.latitude;
                let userLon = position.coords.longitude;

                if (!userPlacemark) {
                    userPlacemark = new ymaps.Placemark([userLat, userLon], {
                        balloonContent: '<b>Вы здесь!</b>'
                    }, { 
                        preset: 'islands#blueCircleDotIcon' 
                    });
                    myMap.geoObjects.add(userPlacemark);
                } else {
                    userPlacemark.geometry.setCoordinates([userLat, userLon]);
                }
                
                myMap.setCenter([userLat, userLon], 15, { checkZoomRange: true });

                allPlaces.forEach(place => {
                    place.distance = getDistance(userLat, userLon, place.lat, place.lon);
                    
                    let distText = place.distance < 1 ? Math.round(place.distance * 1000) + ' м' : place.distance.toFixed(1) + ' км';
                    
                    // ОБНОВИЛИ БАЛУН ПРИ ПОИСКЕ ГЕОЛОКАЦИИ (с двумя кнопками)
                    place.placemark.properties.set('balloonContentBody', 
                        `${place.description}<br><br><b style="color: #2196F3;">📍 Расстояние: ${distText}</b><br><b>Цена:</b> ~${place.price}₽<br><b>Рейтинг:</b> ${place.rating.toFixed(1)}⭐
                        <div class="action-buttons">
                            <button class="route-btn" onclick="buildRoute(${place.lat}, ${place.lon})">🧭 Маршрут</button>
                            <button class="rate-btn" onclick="ratePlace(${place.id})">Оценить</button>
                        </div>`
                    );
                });

                allPlaces.sort((a, b) => a.distance - b.distance);

                renderList();
                switchView('list');
                
                document.getElementById('btn-geo').style.backgroundColor = '#2196F3';
                document.getElementById('btn-geo').style.color = 'white';

            }, err => {
                alert("Не удалось получить геопозицию. Разрешите Telegram доступ к геоданным в настройках телефона.");
            });
        }

        // --- НОВАЯ ФУНКЦИЯ ДЛЯ МАРШРУТА ---
        function buildRoute(lat, lon) {
            // Формируем ссылку для построения маршрута до точки
            // Параметр rtt=pd означает пешеходный маршрут
            let link = `https://yandex.ru/maps/?rtext=~${lat},${lon}&rtt=pd`;
            
            // Пытаемся открыть ссылку системными средствами Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(link);
            } else {
                window.open(link, '_blank');
            }
        }

        function ratePlace(placeId) {
            let botUsername = 'foodcheckproject_bot'; 
            let link = `https://t.me/${botUsername}?start=rate_${placeId}`;
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.openTelegramLink(link);
                window.Telegram.WebApp.close();
            } else {
                alert("Эта кнопка работает только внутри Telegram!");
            }
        }
    </script>
</body>
</html>
